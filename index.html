<!doctype html>
<html lang="da" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Al Irchad skolen - Infoskærm</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1e293b;
  --accent: #2563eb;
  --danger: #dc2626;
  --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
  --panel-bg: rgba(255, 255, 255, 0.7);
  --glass-border: rgba(255, 255, 255, 0.4);
  --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
  --gap: 16px;
}

html, body {
  height: 100%;
  margin: 0;
  background: var(--bg-gradient);
  color: var(--primary);
  font-family: 'Tajawal', sans-serif;
  overflow: hidden;
}

.wrapper {
  display: grid;
  grid-template-columns: 62% 38%;
  height: 100vh;
  gap: var(--gap);
  padding: var(--gap);
  box-sizing: border-box;
}

/* Glass Panels */
.panel {
  background: var(--panel-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.3s ease;
}

/* Left Panel */
.left-panel { display: flex; flex-direction: column; gap: var(--gap); }

.vikarskema {
  padding: 24px;
  height: 100%;
  display: flex;
  flex-direction: column;
  box-sizing: border-box;
}

#vikarskemaHeader {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 0 15px 60px; /* Space for logo */
  border-bottom: 2px solid rgba(0,0,0,0.05);
  margin-bottom: 20px;
}

#vikarskemaTitle { font-size: 32px; font-weight: 700; color: var(--primary); }
.header-meta { font-size: 22px; font-weight: 500; display: flex; gap: 25px; color: #475569; }

/* Tables */
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid rgba(0,0,0,0.05);
}

th {
  background: var(--primary);
  color: #fff;
  padding: 16px;
  font-weight: 600;
  font-size: 18px;
  text-align: center;
}

td {
  padding: 14px;
  text-align: center;
  border-bottom: 1px solid rgba(0,0,0,0.05);
  background: rgba(255,255,255,0.4);
  font-size: 20px;
  font-weight: 500;
}

/* Highlighting */
.current-row-highlight {
  background-color: var(--danger) !important;
  color: white !important;
  font-weight: 700;
  animation: pulseHighlight 2s infinite;
}

@keyframes pulseHighlight {
  0% { background-color: #dc2626; }
  50% { background-color: #ef4444; }
  100% { background-color: #dc2626; }
}

/* Right Panel */
.right-panel { display: flex; flex-direction: column; gap: var(--gap); height: 100%; }
.right-panel .top { flex: 1; padding: 10px; }
.right-panel .bottom { flex: 0 0 300px; padding: 20px; justify-content: center; }

#slideshowImage {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 16px;
  transition: opacity 0.5s ease-in-out;
}

/* Message Box */
#staticMessageBox {
  margin-top: 5px;
  padding: 18px;
  background: var(--danger);
  color: #fff;
  border-radius: 16px;
  font-size: 28px;
  font-weight: 700;
  text-align: center;
  box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
}

/* Logo */
.logo {
  position: fixed;
  top: 24px;
  left: 28px;
  z-index: 1000;
  background: white;
  padding: 8px 12px;
  border-radius: 12px;
  box-shadow: var(--shadow);
}
.logo img { height: 50px; width: auto; }

/* Info/Weather Box */
#infoBox {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: var(--primary);
  color: white;
  padding: 16px 28px;
  border-radius: 50px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  font-size: 22px;
  font-weight: 600;
  z-index: 999;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
}
#infoBox.show { opacity: 1; transform: translateY(0); }

/* Reminder Overlay */
#morgensamlingReminder {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--danger);
  color: white;
  padding: 40px 60px;
  border-radius: 30px;
  font-size: 48px;
  font-weight: 800;
  text-align: center;
  z-index: 10000;
  box-shadow: 0 0 100px rgba(0,0,0,0.5);
  display: none;
}
</style>
</head>
<body>

<div class="logo">
  <img src="https://www.al-irchadskolen.dk/wp-content/uploads/2024/03/images.png" alt="logo">
</div>

<div class="wrapper">
  <div class="left-panel">
    <div class="panel">
      <div class="vikarskema">
        <div id="vikarskemaHeader">
          <span id="vikarskemaTitle">Vikarskema</span>
          <div class="header-meta">
            <span>📅 <span id="vikarskemaDate">–</span></span>
            <span>⏰ <span id="vikarskemaClock">–:–:–</span></span>
          </div>
        </div>
        <div id="vikarskemaContent">Indlæser vikarskema...</div>
      </div>
    </div>
    <div id="staticMessageBox"></div>
  </div>

  <div class="right-panel">
    <div class="panel top">
      <img id="slideshowImage" src="" alt="slideshow">
    </div>
    <div class="panel bottom">
      <div class="schedule" id="schedule"></div>
    </div>
  </div>
</div>

<div id="infoBox">Indlæser information...</div>

<div id="morgensamlingReminder">
  📢 TID TIL MORGENSAMLING!
</div>

<audio id="morgensamlingSound" src="https://raw.githubusercontent.com/ihayek86-spec/Infoscreen/a45ddd605ea18a69772f1352c39d63a2d9748be2/sounds/morgensamling.mp3" muted></audio>
<audio id="gardvagtSound" src="https://raw.githubusercontent.com/ihayek86-spec/Infoscreen/a45ddd605ea18a69772f1352c39d63a2d9748be2/sounds/husk_gardvagt.mp3" muted></audio>

<script>
// TV Browser management
document.body.style.zoom = "1.0";
setInterval(() => { document.body.style.zoom = "1.0"; window.scrollTo(0, 0); }, 30000);

// Clock & Date
function updateClock() {
  const now = new Date();
  document.getElementById("vikarskemaClock").textContent = now.toLocaleTimeString('da-DK', { hour12: false });
  document.getElementById("vikarskemaDate").textContent = now.toLocaleDateString('da-DK', { weekday:'long', day:'numeric', month:'long' });
}
setInterval(updateClock, 1000);
updateClock();

// Local Schedule Fallback
const localSchedules = {
  1:{title:"Gårdvagtskema", rows:[["9:50-10:00","PP","EY","JL","TN","MA"],["11:20-11:55","PP","NC","LC","JD","MA"],["12:35-12:50","PP","JL","KP","JD","SR"]]},
  2:{title:"Gårdvagtskema", rows:[["9:50-10:00","NC","EY","EK","TN","IR"],["11:20-11:55","MD","EY","EK","TN","IR"],["12:35-12:50","MD","JL","EK","IH","SR"]]},
  3:{title:"Gårdvagtskema", rows:[["9:50-10:00","NC","AD","SJ","LL","JL"],["11:20-11:55","ZA","AD","SJ","IH","LL"],["12:35-12:50","ZA","AD","SJ","AFH","LL"]]},
  4:{title:"Gårdvagtskema", rows:[["9:50-10:00","NC","EY","MB","AFH","MT"],["11:20-11:55","HR","LC","MP","MT","SR"],["12:35-12:50","MD","HR","MP","IH","JD"]]},
  5:{title:"Gårdvagtskema", rows:[["9:50-10:00","AD","MB","KP","MT","MA"],["11:20-11:55","MA","MB","MP","AFH","MT"]]}
};

function renderSchedule() {
  const day = new Date().getDay();
  const sch = localSchedules[day] || {title:"Ingen plan", rows:[["-","-","-","-","-","-"]]};
  let html = `<table><thead><tr><th colspan="6">${sch.title}</th></tr><tr style="background:#475569"><th>Pause</th><th>SG1</th><th>SG2</th><th>MB3</th><th>SG4</th><th>G5</th></tr></thead><tbody>`;
  sch.rows.forEach(r => { html += "<tr>" + r.map(c => `<td>${c}</td>`).join("") + "</tr>"; });
  html += "</tbody></table>";
  document.getElementById("schedule").innerHTML = html;
}
renderSchedule();

// API Integration: Vikarskema
async function updateVikarskema() {
  const vikarUrl = "https://script.google.com/macros/s/AKfycbyQ5e7UHSmfxdAGJgfAo7mHHnH37ktEIHO0QPEP7TxOlSZ0Tb5lwTAO_9MBtqZG4vSvWw/exec";
  try {
    const res = await fetch(vikarUrl, { cache: "no-store" });
    const data = await res.json();
    let html = "<table><thead><tr>" + data.headers.map(h => `<th>${h}</th>`).join("") + "</tr></thead><tbody>";
    data.rows.forEach(r => {
      html += "<tr>" + r.map(cell => cell.match(/\.(jpg|jpeg|png|gif|webp)$/i) ? `<td><img src="${cell}" style="max-height:60px;border-radius:4px"></td>` : `<td>${cell}</td>`).join("") + "</tr>";
    });
    document.getElementById("vikarskemaContent").innerHTML = html + "</tbody></table>";
    highlightRows();
  } catch (e) {
    document.getElementById("vikarskemaContent").innerHTML = "<div style='text-align:center;padding:20px;color:red'>Kunne ikke hente data...</div>";
  }
}
setInterval(updateVikarskema, 60000);
updateVikarskema();

function highlightRows() {
  const now = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  const rows = document.querySelectorAll("#vikarskemaContent tbody tr");
  rows.forEach(row => {
    function process(startIdx, endIdx) {
      const cell = row.cells[startIdx];
      if (!cell) return;
      const matches = cell.textContent.match(/(\d{1,2}):(\d{2})/g);
      if (!matches) return;
      const [h, m] = matches[matches.length - 1].split(":").map(Number);
      const start = h * 60 + m;
      if (mins >= start && mins < start + 40) {
        for(let i=startIdx; i<=endIdx; i++) if(row.cells[i]) row.cells[i].classList.add("current-row-highlight");
      }
    }
    process(0, 4); process(6, 10);
  });
}
setInterval(highlightRows, 15000);

// Slideshow
const slideUrl = "https://script.google.com/macros/s/AKfycbwic1LHHatZ_tAehcE4Hvb-QV-m_ua0k0Hedgre_URMhm8Sva2Bf3QltFN9tOCiJJP1Xw/exec";
let images = [], imgIdx = 0;
async function fetchImages() {
  try {
    const res = await fetch(slideUrl);
    const data = await res.json();
    images = (Array.isArray(data) ? data : data.rows || []).flat().filter(s => typeof s === 'string' && s.includes('http'));
  } catch(e) {}
}
function rotateSlides() {
  if (images.length) {
    const el = document.getElementById("slideshowImage");
    el.style.opacity = 0;
    setTimeout(() => {
      el.src = images[imgIdx];
      el.style.opacity = 1;
      imgIdx = (imgIdx + 1) % images.length;
    }, 500);
  }
}
fetchImages().then(() => { rotateSlides(); setInterval(rotateSlides, 7000); });

// Weather & Info
let weather = "-";
async function fetchWeather() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=56.03&longitude=12.59&current_weather=true");
    const data = await res.json();
    weather = `☀️ Helsingør: ${Math.round(data.current_weather.temperature)}°C`;
  } catch(e) {}
}

const infoUrl = "https://script.google.com/macros/s/AKfycbwPfXNL6-gcGdxDWd8FXeBej4mJFnutlgApxtzPelYwk2W_L1MoQS8kYpHunsB17PYutA/exec";
let infoMsgs = [], msgIdx = 0;
async function fetchInfo() {
  try {
    const res = await fetch(infoUrl);
    const data = await res.json();
    const rows = data.rows || data.sheets?.[0]?.rows || [];
    if(rows[0]) document.getElementById("staticMessageBox").textContent = rows[0][1] || "";
    infoMsgs = rows.map(r => r[0]).filter(Boolean);
  } catch(e) {}
}

function cycleInfo() {
  const box = document.getElementById("infoBox");
  box.classList.remove("show");
  setTimeout(() => {
    box.textContent = msgIdx === 0 ? weather : infoMsgs[msgIdx - 1] || "Velkommen";
    box.classList.add("show");
    msgIdx = (msgIdx + 1) % (infoMsgs.length + 1);
  }, 600);
}

fetchWeather(); fetchInfo();
setInterval(cycleInfo, 10000);
setInterval(() => { fetchWeather(); fetchInfo(); }, 60000);

// Reminder Logic
setInterval(() => {
  const n = new Date();
  const h = n.getHours(), m = n.getMinutes();
  document.getElementById("morgensamlingReminder").style.display = (h === 8 && m >= 20 && m < 30) ? "block" : "none";
}, 10000);

// Auto-refresh to keep browser snappy
setInterval(() => location.reload(), 600000);
</script>
</body>
</html>
