<!doctype html>
<html lang="da" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Al Irchad skolen - Infoskærm</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5; 
  --panel-bg: #ffffff;
  --accent: #0056b3; 
  --accent-light: #e7f1ff;
  --text-main: #2d3436;
  --text-muted: #636e72;
  --status-red: #ff7675;
  --gap: 20px;
  --layout-cols: 40% 60%;
}

body {
  background-color: var(--bg);
  background-image: radial-gradient(#d1d1d1 0.5px, transparent 0.5px);
  background-size: 20px 20px;
  color: var(--text-main);
  font-family: 'Tajawal', sans-serif;
  margin: 0;
  height: 100vh;
  overflow: hidden; /* يمنع التمرير نهائياً */
}

.wrapper {
  display: grid;
  grid-template-columns: var(--layout-cols); 
  height: 100vh;
  gap: var(--gap);
  padding: var(--gap);
  box-sizing: border-box;
  transition: grid-template-columns 0.5s ease;
}

/* لوحة الجداول (الجهة اليسرى) */
.left-side {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

.panel {
  background: rgba(255,255,255,0.8);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* لجعل جدول الفيكار قابل للتمرير داخلياً فقط إذا زاد الطول */
.vikarskema {
  overflow-y: auto;
  flex: 1;
}

.vikarskema table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 8px;
  font-size: clamp(18px, 1.6vw, 22px);
}

.vikarskema th { background: var(--accent); color: white; padding: 15px; border-radius: 8px; position: sticky; top: 0; }
.vikarskema td { background: white; padding: 12px; border-radius: 4px; }

#staticMessageBox {
  margin-top: 10px;
  padding: 15px;
  background: #ff3b30;
  border-radius: 12px;
  font-size: 24px;
  font-weight: 700;
  color: white;
  text-align: center;
}

/* اللوحة الوسطى */
#middlePanel { display: none; flex-direction: column; height: 100%; overflow: hidden; }

/* اليمين: الصور + الساعة (الأهم) */
.right-side {
  display: flex;
  flex-direction: column;
  gap: var(--gap);
  height: 100%;
  overflow: hidden; /* يمنع أي عنصر من الخروج */
}

/* صندوق الصور: يأخذ كل المساحة المتبقية لكن لا يتعداها */
.image-box {
  flex: 1; 
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(255, 255, 255, 0.5);
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  overflow: hidden;
  position: relative;
}

#slideshowImage {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain; /* يضمن عدم تمدد الصورة بشكل يشوه التصميم */
}

/* لوحة الساعة والجدول السفلي: ثابتة الارتفاع لضمان عدم اختفائها */
.info-box-bottom {
  height: 320px; /* ارتفاع ثابت يضمن ظهورها دائماً */
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 6px 20px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
}

#bigDateTime {
  padding: 15px;
  background: var(--accent);
  color: white;
  text-align: center;
  margin-top: auto; /* يدفع الساعة لأسفل الصندوق */
}

#bigClock {
  font-size: 65px;
  font-weight: 800;
  font-family: 'monospace', sans-serif;
  line-height: 1;
}

#bigDate { font-size: 20px; opacity: 0.9; }

.schedule { flex: 1; overflow-y: auto; }
.schedule table { width: 100%; border-collapse: collapse; }
.schedule th { background: #f8f9fa; padding: 8px; font-weight: 700; font-size: 14px; }
.schedule td { padding: 8px; text-align: center; border-bottom: 1px solid #eee; font-size: 16px; }

.logo { position: fixed; top: 25px; left: 35px; z-index: 100; }
.logo img { height: 60px; }

</style>
</head>
<body>

<div class="logo"><img src="https://www.al-irchadskolen.dk/wp-content/uploads/2024/03/images.png" alt="logo"></div>

<div class="wrapper" id="mainWrapper">
  
  <div class="left-side">
    <div class="panel" style="height: 100%;">
      <div class="vikarskema">
        <h2 style="margin-top:0">Vikarskema (1-5)</h2>
        <div id="vikarLeftContent">Indlæser...</div>
      </div>
      <div id="staticMessageBox"></div>
    </div>
  </div>

  <div id="middlePanel">
    <div class="panel" style="height: 100%;">
      <div class="vikarskema">
        <h2 style="margin-top:0">Vikarskema (7-11)</h2>
        <div id="vikarMiddleContent"></div>
      </div>
    </div>
  </div>

  <div class="right-side">
    <div class="image-box">
      <img id="slideshowImage" src="" alt="slideshow">
    </div>

    <div class="info-box-bottom">
      <div class="schedule" id="schedule"></div>
      <div id="bigDateTime">
        <div id="bigClock">00:00:00</div>
        <div id="bigDate">Dato indlæses...</div>
      </div>
    </div>
  </div>

</div>

<script>
// (نفس منطق الجافاسكريبت السابق دون تغيير لضمان استقرار العمل)
const IMAGE_WEBHOOK = "https://script.google.com/macros/s/AKfycbwic1LHHatZ_tAehcE4Hvb-QV-m_ua0k0Hedgre_URMhm8Sva2Bf3QltFN9tOCiJJP1Xw/exec";
const INFO_SHEET_URL = "https://script.google.com/macros/s/AKfycbwPfXNL6-gcGdxDWd8FXeBej4mJFnutlgApxtzPelYwk2W_L1MoQS8kYpHunsB17PYutA/exec";
const VIKAR_URL = "https://script.google.com/macros/s/AKfycbyQ5e7UHSmfxdAGJgfAo7mHHnH37ktEIHO0QPEP7TxOlSZ0Tb5lwTAO_9MBtqZG4vSvWw/exec";

let imageData = [];
let currentImageIndex = 0;

function updateDateTime() {
  const now = new Date();
  document.getElementById("bigClock").textContent = now.toLocaleTimeString('da-DK', { hour12: false });
  document.getElementById("bigDate").textContent = now.toLocaleDateString('da-DK', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}
setInterval(updateDateTime, 1000);

async function fetchImages() {
  try {
    const res = await fetch(IMAGE_WEBHOOK);
    const data = await res.json();
    let rows = Array.isArray(data) ? data : data.rows || [];
    imageData = rows.map(r => Array.isArray(r) ? r.find(c => typeof c === "string" && c.match(/\.(jpg|jpeg|png|gif|webp)$/i)) : r.img).filter(Boolean);
  } catch (e) { console.error("Image Fetch Error"); }
}

function cycleImages() {
  if (imageData.length === 0) return;
  document.getElementById("slideshowImage").src = imageData[currentImageIndex];
  currentImageIndex = (currentImageIndex + 1) % imageData.length;
}

async function initSlideshow() {
  await fetchImages();
  if (imageData.length > 0) { cycleImages(); setInterval(cycleImages, 5000); }
}

async function updateVikarskema() {
  try {
    const res = await fetch(VIKAR_URL);
    const data = await res.json();
    const rows = data.rows || [];
    const headers = data.headers || [];

    const hasMiddleData = rows.some(row => row.slice(6, 11).some(cell => cell && cell.toString().trim() !== ""));
    const wrapper = document.getElementById("mainWrapper");
    const middlePanel = document.getElementById("middlePanel");

    if (hasMiddleData) {
      wrapper.style.setProperty('--layout-cols', '1fr 1fr 1fr');
      middlePanel.style.display = 'flex';
      renderTable("vikarMiddleContent", headers.slice(6, 11), rows.map(r => r.slice(6, 11)));
    } else {
      wrapper.style.setProperty('--layout-cols', '40% 60%');
      middlePanel.style.display = 'none';
    }
    renderTable("vikarLeftContent", headers.slice(0, 5), rows.map(r => r.slice(0, 5)));
  } catch (e) { console.error("Vikar Error"); }
}

function renderTable(containerId, headers, rows) {
  let html = "<table><thead><tr>" + headers.map(h => `<th>${h || ''}</th>`).join("") + "</tr></thead><tbody>";
  rows.forEach(r => {
    if (r.some(cell => cell && cell.toString().trim() !== "")) {
      html += "<tr>" + r.map(cell => `<td>${cell || ''}</td>`).join("") + "</tr>";
    }
  });
  html += "</tbody></table>";
  document.getElementById(containerId).innerHTML = html;
}

const localSchedules = {
  1:{title:"Gårdvagtskema", rows:[["9:50-10:00","PP","EY","JL","TN","MA"],["11:20-11:55","PP","NC","LC","JD","MA"],["12:35-12:50","PP","JL","KP","JD","SR"]]},
  2:{title:"Gårdvagtskema", rows:[["9:50-10:00","NC","EY","EK","TN","IR"],["11:20-11:55","MD","EY","EK","TN","IR"],["12:35-12:50","MD","JL","EK","IH","SR"]]},
  3:{title:"Gårdvagtskema", rows:[["9:50-10:00","NC","AD","SJ","LL","JL"],["11:20-11:55","ZA","AD","SJ","IH","LL"],["12:35-12:50","ZA","AD","SJ","AFH","LL"]]},
  4:{title:"Gårdvagtskema", rows:[["9:50-10:00","NC","EY","MB","AFH","MT"],["11:20-11:55","HR","LC","MP","MT","SR"],["12:35-12:50","MD","HR","MP","IH","JD"]]},
  5:{title:"Gårdvagtskema", rows:[["9:50-10:00","AD","MB","KP","MT","MA"],["11:20-11:55","MA","MB","MP","AFH","MT"]]}
};

function renderStaticSchedule() {
  const day = new Date().getDay();
  const sch = localSchedules[day] || {title:"Ingen skema", rows:[]};
  let html = `<table><thead><tr><th colspan="6">${sch.title}</th></tr></thead><tbody>`;
  sch.rows.forEach(r => { html += "<tr>" + r.map(c => `<td>${c}</td>`).join("") + "</tr>"; });
  document.getElementById("schedule").innerHTML = html + "</tbody></table>";
}

async function updateMessages() {
  try {
    const res = await fetch(INFO_SHEET_URL);
    const data = await res.json();
    const rows = data.rows || (data.sheets && data.sheets[0].rows) || [];
    if(rows[0]) document.getElementById("staticMessageBox").textContent = rows[0][1] || "";
  } catch(e) {}
}

window.onload = () => {
  updateDateTime(); initSlideshow(); updateVikarskema(); renderStaticSchedule(); updateMessages();
  setInterval(updateMessages, 60000); setInterval(updateVikarskema, 60000);
};

setInterval(() => location.reload(), 3600000);
</script>
</body>
</html>
