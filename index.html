<!doctype html>
<html lang="da" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Al Irchad skolen - Infoskærm</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5; 
  --accent: #2d3436; 
  --info-bg: #007aff; 
  --gap: 20px;
}

* { box-sizing: border-box; }

body {
  background-color: var(--bg);
  background-image: radial-gradient(#d1d1d1 0.5px, transparent 0.5px);
  background-size: 20px 20px;
  color: #2d3436;
  font-family: 'Tajawal', sans-serif;
  margin: 0;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* --- Splash Screen --- */
#splashScreen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: white; display: flex; justify-content: center; align-items: center;
  z-index: 9999; transition: opacity 0.8s ease-out;
}
.splash-content { text-align: center; }
.splash-text { font-size: 80px; font-weight: 800; margin-top: 20px; color: var(--accent); }
.splash-logo { height: 560px; filter: drop-shadow(0 4px 15px rgba(0,0,0,0.1)); animation: logoZoomIn 1.2s ease-out forwards; }

@keyframes logoZoomIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

#mainWrapper { 
  opacity: 0; transition: opacity 1s ease-in; 
  height: 100vh; width: 100%; padding-bottom: 60px;
}

.bottom-right-logo {
  position: fixed; bottom: 0; right: 0; height: 60px; width: 120px; z-index: 3000; 
  background: white; display: flex; justify-content: center; align-items: center;
  box-shadow: -2px 0 10px rgba(0,0,0,0.1);
}
.bottom-right-logo img { height: 50px; width: auto; }

.wrapper {
  display: grid; grid-template-columns: 40% 1fr;
  height: 100vh; gap: var(--gap); padding: var(--gap); width: 100%;
}

.left-side { display: flex; flex-direction: column; height: 100%; overflow: hidden; }

.panel {
  background: rgba(255,255,255,0.9);
  border-radius: 16px; padding: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  display: flex; flex-direction: column; overflow: hidden;
}

.vikarskema { overflow-y: auto; flex: 1; display: none; }
.vikarskema table { width: 100%; border-collapse: collapse; font-size: 18px; }
.vikarskema th { background: var(--accent); color: white; padding: 10px; position: sticky; top: 0; font-size: 18px; }
.vikarskema td { background: white; padding: 10px; text-align: center; border-bottom: 1px solid #eee; font-weight: 400; }
.vikarskema h2 { margin: 0 0 12px 0; font-size: 20px !important; color: var(--accent); text-align: center; }

#noVikarMessage {
  display: none; 
  text-align: center; 
  padding: 40px; 
  flex-direction: column; 
  justify-content: center; 
  height: 100%;
  background: #ffffff;
  border-radius: 16px;
}

#noVikarMessage .main-text { 
  font-size: 60px; /* خط كبير جداً للعنوان */
  color: var(--accent); 
  font-weight: 800; 
  margin-bottom: 30px;
}

#noVikarMessage .sub-text { 
  font-size: 36px; /* خط كبير وواضح للوصف */
  color: #2d3436; 
  line-height: 1.4;
  font-weight: 400;
}

.right-side { display: flex; flex-direction: column; gap: var(--gap); height: 100%; overflow: hidden; }

.image-box {
  flex: 1; position: relative; background: #000; border-radius: 16px;
  overflow: hidden; box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}
#slideshowImage {
  width: 100%; height: 100%; object-fit: cover; position: absolute;
  top: 0; left: 0; transition: opacity 1.3s ease-in-out;
  animation: cinematicZoom 25s infinite alternate ease-in-out;
}

@keyframes cinematicZoom { from { transform: scale(1); } to { transform: scale(1.25); } }

/* --- تعديل ارتفاع منطقة الجدول والساعة --- */
.info-box-bottom { 
  background: white; 
  border-radius: 16px; 
  overflow: hidden; 
  display: flex; 
  box-shadow: 0 6px 20px rgba(0,0,0,0.1); 
  flex-shrink: 0;
  max-height: 180px; /* تحديد أقصى ارتفاع للمنطقة بالكامل */
}

#schedule { flex: 1.2; padding: 6px; background: white; } /* تقليل padding */

#bigDateTime { 
  flex: 0.8; 
  padding: 8px; /* تقليل padding من 15px */
  background: var(--accent); 
  color: white; 
  text-align: center; 
  display: flex; 
  flex-direction: column; 
  justify-content: center; 
}

#bigClock { font-size: 38px; font-weight: 800; font-family: 'monospace'; } /* تصغير الخط من 46px */
#bigDate { font-size: 26px; font-weight: 700; margin-top: 2px; } /* تصغير الخط من 32px */

.schedule table { width: 100%; border-collapse: separate; border-spacing: 3px; }
.schedule th { 
  background: #2d5a27; 
  color: white; 
  padding: 8px; /* تقليل padding من 12px */
  font-size: 22px; /* تصغير الخط من 28px */
  border-radius: 6px; 
}
.schedule td { 
  padding: 6px; /* تقليل padding من 10px */
  text-align: center; 
  background: #f0f9f0; 
  color: #2d5a27; 
  font-weight: 700; 
  font-size: 18px; /* تصغير الخط من 22px */
  border-radius: 4px; 
}

#infoBox { 
  position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; 
  z-index: 2000; background: linear-gradient(135deg, var(--info-bg), #005bb5); 
  color: #fff; overflow: hidden; display: flex; align-items: center;
  padding-right: 130px; 
}

.ticker-wrapper { display: inline-flex; white-space: nowrap; font-size: 26px; font-weight: 600; }
@keyframes scrollText { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

#middlePanel { display: none; flex-direction: column; height: 100%; overflow: hidden; }

/* --- Mode 2 Layout --- */
.mode-two-panels { grid-template-columns: 1fr 1fr 1.15fr !important; gap: 15px !important; }
.mode-two-panels .info-box-bottom { display: none !important; }
.mode-two-panels .right-side { width: 100% !important; display: flex !important; flex-direction: column !important; gap: 15px !important; }
.mode-two-panels .image-box { flex: 1 !important; height: auto !important; width: 100% !important; border-radius: 16px; }
.mode-two-panels #schedule { display: flex !important; flex: 0 0 auto !important; border-radius: 16px; margin-bottom: 0 !important; }
.mode-two-panels #bigDateTime { display: flex !important; flex: 0 0 110px !important; border-radius: 16px; }

#staticMessageBox { margin-top: 10px; padding: 12px; background: #ff3b30; border-radius: 10px; font-size: 23px; font-weight: 700; color: white; text-align: center; }
</style>
</head>
<body>

<div id="splashScreen">
  <div class="splash-content">
      <img src="https://raw.githubusercontent.com/ihayek86-spec/Infoscreen/66e40c3575155e33e7b1b58f639b025137028cd9/images/logo.png" class="splash-logo">
      <div class="splash-text">INFOSKÆRM</div>
  </div>
</div>

<div class="bottom-right-logo">
    <img src="https://raw.githubusercontent.com/ihayek86-spec/Infoscreen/66e40c3575155e33e7b1b58f639b025137028cd9/images/logo.png" alt="School Logo">
</div>

<div class="wrapper" id="mainWrapper">
  <div class="left-side">
    <div class="panel" style="height: 100%;">
      <div id="vikarLeftWrapper" class="vikarskema">
        <h2 id="titleLeft">Vikarskema 1</h2>
        <div id="vikarLeftContent"></div>
      </div>
<div id="noVikarMessage">
  <div class="main-text">Hov! Der er tomt her...</div>
  <div class="sub-text">
    Der er ikke noget vikarskema endnu.<br><br>
    <span style="color: #d63031; font-weight: 700;">Der kan komme ændringer senere, hold øje med skærmen!</span>
  </div>
</div>
      <div id="staticMessageBox"></div>
    </div>
  </div>

  <div id="middlePanel">
    <div class="panel" style="height: 100%;">
      <div id="vikarMiddleWrapper" class="vikarskema">
        <h2 id="titleMiddle">Vikarskema 2</h2>
        <div id="vikarMiddleContent"></div>
      </div>
    </div>
  </div>

  <div class="right-side" id="rightSide">
    <div class="image-box"><img id="slideshowImage" src=""></div>
    <div class="info-box-bottom" id="bottomFooter">
      <div class="schedule" id="schedule"></div>
      <div id="bigDateTime">
        <div id="bigClock">00:00:00</div>
        <div id="bigDate">Dato...</div>
      </div>
    </div>
  </div>
</div>

<div id="infoBox"><div class="ticker-wrapper" id="tickerWrapper"></div></div>

<script>
const IMAGE_WEBHOOK = "https://script.google.com/macros/s/AKfycbwic1LHHatZ_tAehcE4Hvb-QV-m_ua0k0Hedgre_URMhm8Sva2Bf3QltFN9tOCiJJP1Xw/exec";
const INFO_SHEET_URL = "https://script.google.com/macros/s/AKfycbwPfXNL6-gcGdxDWd8FXeBej4mJFnutlgApxtzPelYwk2W_L1MoQS8kYpHunsB17PYutA/exec";
const VIKAR_URL = "https://script.google.com/macros/s/AKfycbyQ5e7UHSmfxdAGJgfAo7mHHnH37ktEIHO0QPEP7TxOlSZ0Tb5lwTAO_9MBtqZG4vSvWw/exec";

let imageData = [];
let currentImageIndex = 0;

function updateDateTime() {
  const now = new Date();
  document.getElementById("bigClock").textContent = now.toLocaleTimeString('da-DK', { hour12: false });
  document.getElementById("bigDate").textContent = now.toLocaleDateString('da-DK', { weekday: 'short', day: 'numeric', month: 'short' });
}

async function updateVikarskema() {
  try {
    const res = await fetch(VIKAR_URL);
    const data = await res.json();
    const rows = data.rows || [];
    const headers = data.headers || [];
    const cleanRows = rows.filter(row => row.some(cell => cell && cell.toString().trim() !== ""));
    const leftRows = cleanRows.filter(row => row.slice(0, 5).some(c => c && c.toString().trim() !== ""));
    const middleRows = cleanRows.filter(row => row.slice(6, 11).some(c => c && c.toString().trim() !== ""));

    const hasLeftData = leftRows.length > 0;
    const hasMiddleData = middleRows.length > 0;

    const wrapper = document.getElementById("mainWrapper");
    const middlePanel = document.getElementById("middlePanel");
    const vikarLeftWrapper = document.getElementById("vikarLeftWrapper");
    const vikarMiddleWrapper = document.getElementById("vikarMiddleWrapper");
    const noVikar = document.getElementById("noVikarMessage");
    const rightSide = document.getElementById("rightSide");
    const bottomFooter = document.getElementById("bottomFooter");
    const schedule = document.getElementById("schedule");
    const dateTime = document.getElementById("bigDateTime");

    if (!hasLeftData && !hasMiddleData) {
      vikarLeftWrapper.style.display = 'none';
      middlePanel.style.display = 'none';
      noVikar.style.display = 'flex'; 
      wrapper.classList.remove('mode-two-panels');
      bottomFooter.appendChild(schedule);
      bottomFooter.appendChild(dateTime);
    } else {
      noVikar.style.display = 'none';
      if (hasLeftData) {
        renderTable("vikarLeftContent", headers.slice(0, 5), leftRows.map(r => r.slice(0, 5)));
        vikarLeftWrapper.style.display = 'block';
      } else {
        vikarLeftWrapper.style.display = 'none';
      }
      if (hasMiddleData) {
        renderTable("vikarMiddleContent", headers.slice(6, 11), middleRows.map(r => r.slice(6, 11)));
        middlePanel.style.display = 'flex';
        vikarMiddleWrapper.style.display = 'block'; 
        wrapper.classList.add('mode-two-panels');
        rightSide.appendChild(schedule);
        rightSide.appendChild(dateTime);
      } else {
        middlePanel.style.display = 'none';
        wrapper.classList.remove('mode-two-panels');
        bottomFooter.appendChild(schedule);
        bottomFooter.appendChild(dateTime);
      }
    }
  } catch (e) { console.error("Error updating Vikarskema:", e); }
}

function renderTable(id, headers, rows) {
  if (rows.length === 0) return;
  let html = "<table><thead><tr>" + headers.map(h => `<th>${h || ''}</th>`).join("") + "</tr></thead><tbody>";
  rows.forEach(r => { html += `<tr>` + r.map(cell => `<td>${cell || ''}</td>`).join("") + "</tr>"; });
  document.getElementById(id).innerHTML = html + "</tbody></table>";
}

const localSchedules = {
  1:{title:"Gårdvagtskema", rows:[["9:50-10:00","PP","EY","JL","TN","MA"],["11:20-11:55","PP","NC","LC","JD","MA"],["12:35-12:50","PP","JL","KP","JD","SR"]]},
  2:{title:"Gårdvagtskema", rows:[["9:50-10:00","NC","EY","EK","TN","IR"],["11:20-11:55","MD","EY","EK","TN","IR"],["12:35-12:50","MD","JL","EK","IH","SR"]]},
  3:{title:"Gårdvagtskema", rows:[["9:50-10:00","NC","AD","SJ","LL","JL"],["11:20-11:55","ZA","AD","SJ","IH","LL"],["12:35-12:50","ZA","AD","SJ","AFH","LL"]]},
  4:{title:"Gårdvagtskema", rows:[["9:50-10:00","NC","EY","MB","AFH","MT"],["11:20-11:55","HR","LC","MP","MT","SR"],["12:35-12:50","MD","HR","MP","IH","JD"]]},
  5:{title:"Gårdvagtskema", rows:[["9:50-10:00","AD","MB","KP","MT","MA"],["10:50-11:20","MA","MB","MP","AFH","MT"]]}
};

function renderStaticSchedule() {
  const day = new Date().getDay();
  const sch = localSchedules[day] || {title:"Ingen skema", rows:[]};
  let html = `<table><thead><tr><th colspan="6">${sch.title}</th></tr></thead><tbody>`;
  sch.rows.forEach(r => { html += `<tr>` + r.map(c => `<td>${c}</td>`).join("") + "</tr>"; });
  document.querySelectorAll(".schedule").forEach(container => container.innerHTML = html + "</tbody></table>");
}

async function fetchSheetRows() {
  try {
    const res = await fetch(INFO_SHEET_URL);
    const data = await res.json();
    let rows = data.rows || [];
    if(rows[0]) document.getElementById("staticMessageBox").textContent = rows[0][1] || "";
    const fullText = rows.map(r => r[0]).filter(Boolean).join("    |    ") + "    |    Al Irchad Skolen    |    ";
    const ticker = document.getElementById("tickerWrapper");
    ticker.innerHTML = `<span>${fullText}</span><span>${fullText}</span>`;
    ticker.style.animation = `scrollText ${fullText.length/3}s linear infinite`;
  } catch(e) {}
}

async function fetchImages() {
  try {
    const res = await fetch(IMAGE_WEBHOOK);
    const data = await res.json();
    let rows = Array.isArray(data) ? data : data.rows || [];
    imageData = rows.map(r => Array.isArray(r) ? r.find(c => typeof c === "string" && c.match(/\.(jpg|jpeg|png|webp)$/i)) : r.img).filter(Boolean);
    if (imageData.length > 0 && !document.getElementById("slideshowImage").src) cycleImages();
  } catch (e) {}
}

function cycleImages() {
  if (imageData.length === 0) return;
  const img = document.getElementById("slideshowImage");
  img.style.opacity = "0";
  setTimeout(() => {
    img.src = imageData[currentImageIndex];
    img.style.opacity = "1";
    currentImageIndex = (currentImageIndex + 1) % imageData.length;
  }, 1500);
}

window.onload = async () => {
  updateDateTime(); 
  setInterval(updateDateTime, 1000);
  renderStaticSchedule();
  await fetchImages(); 
  setInterval(cycleImages, 12000);
  updateVikarskema(); 
  setInterval(updateVikarskema, 60000);
  fetchSheetRows(); 
  setInterval(fetchSheetRows, 600000);
  setTimeout(() => {
    document.getElementById("splashScreen").style.opacity = "0";
    document.getElementById("mainWrapper").style.opacity = "1";
    setTimeout(() => document.getElementById("splashScreen").style.display = "none", 800);
  }, 2000);
};
</script>
</body>
</html>
