<!doctype html>
<html lang="da" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Al Irchad skolen - Infoskærm</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5; 
  --accent: #0056b3; 
  --info-bg: #007aff; 
  --gap: 20px;
  --highlight: #fffa65;
}

* { box-sizing: border-box; }

body {
  background-color: var(--bg);
  background-image: radial-gradient(#d1d1d1 0.5px, transparent 0.5px);
  background-size: 20px 20px;
  color: #2d3436;
  font-family: 'Tajawal', sans-serif;
  margin: 0;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
  font-size: 17px;
}

/* --- شاشة الترحيب --- */
#splashScreen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: white; display: flex; justify-content: center; align-items: center;
  z-index: 9999; transition: opacity 0.8s ease-out;
}
.splash-logo { height: 560px; animation: logoZoomIn 1.2s ease-out forwards; }
@keyframes logoZoomIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

#mainWrapper { opacity: 0; transition: opacity 1s ease-in; height: 100vh; width: 100%; padding-bottom: 60px; }

.logo { position: fixed; top: 25px; right: 35px; z-index: 100; }
.logo img { height: 75px; }

.wrapper {
  display: grid; grid-template-columns: 40% 1fr;
  height: 100vh; gap: var(--gap); padding: var(--gap); width: 100%;
}

.panel {
  background: #ffffff !important; border-radius: 16px; padding: 15px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08); display: flex; flex-direction: column;
  overflow: hidden; height: 100%; position: relative;
}

.vikarskema { overflow-y: auto; flex: 1; }
.vikarskema table { width: 100%; border-collapse: collapse; }
.vikarskema th { background: var(--accent); color: white; padding: 12px; position: sticky; top: 0; }
.vikarskema td { background: white; padding: 9px; text-align: center; border-bottom: 1px solid #eee; }

.active-shift td { background-color: var(--highlight) !important; font-weight: 800; }

/* --- أنيميشن النط للأيموجي --- */
.funny-loader { 
  font-size: 70px; display: inline-block; margin-bottom: 20px; 
  animation: bounce 2s infinite ease-in-out; 
}
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

/* --- أنيميشن النبض البرتقالي محسّن لمنع التعليق --- */
#noVikarMessage {
  display: none; background: #ffffff; text-align: center; padding: 40px; 
  border-radius: 16px; border-left: 12px solid #f39c12; 
  height: 100%; width: 100%; flex-direction: column; justify-content: center; align-items: center;
  position: absolute; top: 0; left: 0; z-index: 20;
  animation: pulseOrange 4s infinite alternate ease-in-out;
  will-change: background-color; /* لتحسين أداء كرت الشاشة */
}
@keyframes pulseOrange { 0% { background-color: #ffffff; } 100% { background-color: #fff8f0; } }

.right-side { display: flex; flex-direction: column; gap: var(--gap); height: 100%; overflow: hidden; }
.image-box { flex: 1; position: relative; background: #000; border-radius: 16px; overflow: hidden; }
#slideshowImage { width: 100%; height: 100%; object-fit: cover; position: absolute; transition: opacity 1.5s; }

.info-box-bottom { background: white; border-radius: 16px; overflow: hidden; display: flex; height: 140px; }
#infoBox { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; background: var(--info-bg); color: #fff; display: flex; align-items: center; overflow: hidden; }

.ticker-wrapper { display: inline-flex; white-space: nowrap; font-size: 26px; font-weight: 600; }
@keyframes scrollText { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

#schedule { flex: 1.2; padding: 10px; }
#bigDateTime { flex: 0.8; padding: 15px; background: var(--accent); color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; }
#bigClock { font-size: 46px; font-weight: 800; }
#bigDate { font-size: 32px; }

.schedule table { width: 100%; border-collapse: separate; border-spacing: 4px; }
.schedule th { background: #2d5a27; color: white; padding: 10px; font-size: 24px; border-radius: 6px; }
.schedule td { padding: 8px; text-align: center; background: #f0f9f0; font-weight: 700; border-radius: 4px; }

#middlePanel { display: none; height: 100%; }
.mode-two-panels { grid-template-columns: 33% 33% 1fr !important; }
.mode-two-panels .info-box-bottom { display: none !important; }

</style>
</head>
<body>

<div id="splashScreen"><img src="https://raw.githubusercontent.com/ihayek86-spec/Infoscreen/66e40c3575155e33e7b1b58f639b025137028cd9/images/logo.png" class="splash-logo"></div>
<div class="logo"><img src="https://raw.githubusercontent.com/ihayek86-spec/Infoscreen/66e40c3575155e33e7b1b58f639b025137028cd9/images/logo.png"></div>

<div class="wrapper" id="mainWrapper">
  <div class="left-side">
    <div class="panel">
      <div class="vikarskema" id="vikarLeftWrapper">
        <h2 id="vikarTitle" style="margin:0 0 10px 0; font-size: 23px;">Vikarskema 1</h2>
        <div id="vikarLeftContent">Indlæser...</div>
      </div>
      <div id="noVikarMessage">
        <span class="funny-loader">🔭🧐</span>
        <div style="font-size: 30px; color: #d35400; margin-bottom: 10px; font-weight: 800;">Hov! Der er tomt her...</div>
        <div style="font-size: 20px;">Der er ikke noget vikarskema endnu.</div>
      </div>
      <div id="staticMessageBox"></div>
    </div>
  </div>
  <div id="middlePanel" class="panel"><div class="vikarskema"><h2 style="margin:0 0 10px 0;">Vikarskema 2</h2><div id="vikarMiddleContent"></div></div></div>
  <div class="right-side" id="rightSide">
    <div class="image-box"><img id="slideshowImage" src=""></div>
    <div class="info-box-bottom" id="bottomFooter">
        </div>
  </div>
</div>

<div id="infoBox"><div class="ticker-wrapper" id="tickerWrapper"></div></div>

<script>
const IMAGE_WEBHOOK = "https://script.google.com/macros/s/AKfycbwic1LHHatZ_tAehcE4Hvb-QV-m_ua0k0Hedgre_URMhm8Sva2Bf3QltFN9tOCiJJP1Xw/exec";
const INFO_SHEET_URL = "https://script.google.com/macros/s/AKfycbwPfXNL6-gcGdxDWd8FXeBej4mJFnutlgApxtzPelYwk2W_L1MoQS8kYpHunsB17PYutA/exec";
const VIKAR_URL = "https://script.google.com/macros/s/AKfycbyQ5e7UHSmfxdAGJgfAo7mHHnH37ktEIHO0QPEP7TxOlSZ0Tb5lwTAO_9MBtqZG4vSvWw/exec";

// تخزين العناصر لتجنب إعادة استدعائها
const elements = {
    schedule: null, dateTime: null, bottomFooter: null, rightSide: null, wrapper: null
};

function createStaticElements() {
    elements.schedule = document.createElement('div'); elements.schedule.id = "schedule"; elements.schedule.className = "schedule";
    elements.dateTime = document.createElement('div'); elements.dateTime.id = "bigDateTime";
    elements.dateTime.innerHTML = `<div id="bigClock">00:00:00</div><div id="bigDate">Dato...</div>`;
    elements.bottomFooter = document.getElementById("bottomFooter");
    elements.rightSide = document.getElementById("rightSide");
    elements.wrapper = document.getElementById("mainWrapper");
}

function updateDateTime() {
    const now = new Date();
    document.getElementById("bigClock").textContent = now.toLocaleTimeString('da-DK', { hour12: false });
    document.getElementById("bigDate").textContent = now.toLocaleDateString('da-DK', { weekday: 'short', day: 'numeric', month: 'short' });
}

async function updateVikarskema() {
    try {
        const res = await fetch(VIKAR_URL);
        const data = await res.json();
        const rows = data.rows || [];
        const hasLeft = rows.some(r => r.slice(0, 5).some(c => c && c.toString().trim() !== ""));
        const hasMid = rows.some(r => r.slice(6, 11).some(c => c && c.toString().trim() !== ""));

        const noVikar = document.getElementById("noVikarMessage");
        const leftWrap = document.getElementById("vikarLeftWrapper");
        const middlePanel = document.getElementById("middlePanel");

        if (!hasLeft) {
            noVikar.style.display = 'flex';
            leftWrap.style.display = 'none';
            middlePanel.style.display = 'none';
            elements.wrapper.classList.remove('mode-two-panels');
            if (elements.bottomFooter.children.length === 0) {
                elements.bottomFooter.appendChild(elements.schedule);
                elements.bottomFooter.appendChild(elements.dateTime);
            }
        } else {
            noVikar.style.display = 'none';
            leftWrap.style.display = 'block';
            if (hasMid) {
                middlePanel.style.display = 'flex';
                elements.wrapper.classList.add('mode-two-panels');
                if (!elements.rightSide.contains(elements.schedule)) {
                    elements.rightSide.appendChild(elements.schedule);
                    elements.rightSide.appendChild(elements.dateTime);
                }
                renderTable("vikarMiddleContent", data.headers.slice(6, 11), rows.map(r => r.slice(6, 11)));
            } else {
                middlePanel.style.display = 'none';
                elements.wrapper.classList.remove('mode-two-panels');
                if (!elements.bottomFooter.contains(elements.schedule)) {
                    elements.bottomFooter.appendChild(elements.schedule);
                    elements.bottomFooter.appendChild(elements.dateTime);
                }
            }
            renderTable("vikarLeftContent", data.headers.slice(0, 5), rows.map(r => r.slice(0, 5)));
        }
    } catch (e) {}
}

function renderTable(id, head, rows) {
    let html = "<table><thead><tr>" + head.map(h => `<th>${h||''}</th>`).join("") + "</tr></thead><tbody>";
    rows.forEach(r => {
        if (r.some(c => c && c.toString().trim() !== "")) {
            html += `<tr>` + r.map(c => `<td>${c||''}</td>`).join("") + "</tr>";
        }
    });
    document.getElementById(id).innerHTML = html + "</tbody></table>";
}

// الأكواد الأخرى (الصور، الطقس، الأخبار) مدمجة لتعمل بسلاسة
let imageData = [];
async function fetchImages() {
    try {
        const res = await fetch(IMAGE_WEBHOOK);
        const data = await res.json();
        imageData = (data.rows || data).map(r => Array.isArray(r) ? r.find(c => typeof c === "string" && c.match(/\.(jpg|jpeg|png|webp)$/i)) : r.img).filter(Boolean);
    } catch(e){}
}

function cycleImages() {
    if (imageData.length === 0) return;
    const img = document.getElementById("slideshowImage");
    img.style.opacity = "0";
    setTimeout(() => {
        img.src = imageData[Math.floor(Math.random() * imageData.length)];
        img.style.opacity = "1";
    }, 1500);
}

window.onload = async () => {
    createStaticElements();
    updateDateTime(); setInterval(updateDateTime, 1000);
    await fetchImages(); cycleImages(); setInterval(cycleImages, 15000);
    updateVikarskema(); setInterval(updateVikarskema, 60000);
    
    setTimeout(() => {
        document.getElementById("splashScreen").style.opacity = "0";
        document.getElementById("mainWrapper").style.opacity = "1";
        setTimeout(() => document.getElementById("splashScreen").style.display = "none", 800);
    }, 2000);
};
</script>
</body>
</html>
